<div class="page-card">
  <div class="filter-bar">
    <div class="select-wrap">
      <label class="filter-label" for="notary-status-filter">Status</label>
      <select class="filter-select" id="notary-status-filter" name="notary-status-filter">
        <option>All Statuses</option>
      </select>
    </div>
    <div class="select-wrap">
      <label class="filter-label" for="notary-date-filter">Date Range</label>
      <select class="filter-select" id="notary-date-filter" name="notary-date-filter">
        <option>Last 30 Days</option>
      </select>
    </div>
    <div class="select-wrap">
      <label class="filter-label" for="notary-act-filter">Act Type</label>
      <select class="filter-select" id="notary-act-filter" name="notary-act-filter">
        <option>All Acts</option>
      </select>
    </div>
    <div class="input-wrap">
      <label class="filter-label" for="notary-search-filter">Notary</label>
      <input class="text-input" id="notary-search-filter" name="notary-search-filter" type="text" placeholder="Name or ID" />
    </div>
    <div class="select-wrap">
      <label class="filter-label" for="notary-state-filter">State</label>
      <select class="filter-select" id="notary-state-filter" name="notary-state-filter">
        <option>All States</option>
      </select>
    </div>
    <button class="button button--ghost" id="notary-clear-filters" type="button">Clear all</button>
  </div>
</div>
